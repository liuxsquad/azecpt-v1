<!DOCTYPE html>  <html lang="az">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Azecpt v1</title>  <style>  
body{  
margin:0;  
font-family:Arial;  
background:#0f172a;  
display:flex;  
justify-content:center;  
align-items:center;  
height:100vh;  
}  
  
.container{  
width:95%;  
max-width:500px;  
background:#111827;  
border-radius:12px;  
padding:15px;  
color:white;  
}  
  
h1{  
text-align:center;  
}  
  
#chat{  
height:420px;  
overflow-y:auto;  
background:#020617;  
padding:10px;  
border-radius:8px;  
margin-bottom:10px;  
}  
  
.msg{  
margin:6px 0;  
padding:8px;  
border-radius:6px;  
}  
  
.user{  
background:#2563eb;  
text-align:right;  
}  
  
.bot{  
background:#374151;  
}  
  
.input{  
display:flex;  
}  
  
input{  
flex:1;  
padding:10px;  
border:none;  
border-radius:6px;  
}  
  
button{  
padding:10px;  
margin-left:5px;  
border:none;  
background:#22c55e;  
color:white;  
border-radius:6px;  
}  
</style>  </head>  <body>  <div class="container">  
<h1>Azecpt v1</h1>  <div id="chat"></div>  <div class="input">  
<input id="text" placeholder="Mesaj yaz..." />  
<button onclick="send()">Gönder</button>  
</div>  
</div>  <script>  
  
const API_KEY = "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";  
  
let chat = document.getElementById("chat");  
  
function add(text,type){  
let div=document.createElement("div");  
div.className="msg "+type;  
div.innerText=text;  
chat.appendChild(div);  
chat.scrollTop=chat.scrollHeight;  
}  
  
async function send(){  
  
let input=document.getElementById("text");  
let msg=input.value;  
  
if(msg.trim()=="") return;  
  
add(msg,"user");  
input.value="";  
  
add("Yazıram...","bot");  
  
const res = await fetch("https://api.openai.com/v1/chat/completions",{  
method:"POST",  
headers:{  
"Content-Type":"application/json",  
"Authorization":"Bearer "+API_KEY  
},  
body:JSON.stringify({  
model:"gpt-4o-mini",  
messages:[  
{role:"system",content:"Sən Azecpt v1 adlı Azərbaycan dilində danışan süni zəkasan."},  
{role:"user",content:msg}  
]  
})  
});  
  
const data = await res.json();  
  
chat.lastChild.remove();  
  
add(data.choices[0].message.content,"bot");  
  
}  
  
</script>  </body>
